<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetSentinel - Surveillance Réseau</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <h2>NetSentinel</h2>
            </div>
            <nav class="nav-menu">
                <button onclick="naviguerVers('tableau_de_bord')" class="nav-btn active">Tableau de bord</button>
                <button onclick="naviguerVers('applications')" class="nav-btn">Applications détections</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 id="page-title">Tableau de bord</h1>
            </header>

            <div id="content-zone">
                
                <section id="view-tableau_de_bord" class="page-view">
                    <div class="stats-grid">
                        <div class="card">
                            <h3>Vitesse Instantanée</h3>
                            <p id="stat-vitesse">-- Mbps</p>
                        </div>
                        <div class="card">
                            <h3>Volume Total Transité</h3>
                            <p id="stat-volume">-- GB</p>
                        </div>
                    </div>

                    <div class="chart-container">
                        <h3>Activité en temps réel</h3>
                        <canvas id="networkChart"></canvas>
                    </div>

                    <div class="process-section">
                        <h3>Top Processus Actifs</h3>
                        <ul id="mini-process-list">
                            </ul>
                    </div>
                </section>

                <section id="view-applications" class="page-view" style="display: none;">
                    <div class="table-container">
                        <table id="apps-table">
                            <thead>
                                <tr>
                                    <th>PID</th>
                                    <th>Application</th>
                                    <th>Utilisation CPU</th>
                                    <th>Mémoire Vive</th>
                                    <th>Statut</th>
                                </tr>
                            </thead>
                            <tbody id="apps-table-body">
                                </tbody>
                        </table>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
